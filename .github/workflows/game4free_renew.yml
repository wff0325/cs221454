name: Game4Free-Final-Package

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动跑一次

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST V3 代理 (指定 v3.2.6)
        run: |
          curl -fL -o gost.tar.gz "https://github.com/go-gost/gost/releases/download/v3.2.6/gost_3.2.6_linux_amd64v3.tar.gz"
          tar -xzf gost.tar.gz && chmod +x gost
          # 启动隧道: 本地 8080 -> 你的 SOCKS5
          nohup ./gost -L http://:8080 -F "socks5://506f268b:080db8e0151f@38.58.180.132:3104" > gost.log 2>&1 &
          sleep 8
          echo "✅ GOST 代理已就绪"

      - name: 🧩 下载破解插件 (指定 Buster v3.1.0)
        run: |
          curl -fL -o buster.zip "https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip"
          mkdir -p captcha_solver
          unzip -o buster.zip -d captcha_solver
          # 检查 manifest.json 位置，确保插件目录正确
          ls -R captcha_solver

      - name: 🛠️ 安装系统环境
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable xvfb
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行随机名续期脚本
        run: |
          # 关键：通过 xvfb-run 运行，允许脚本内使用 headless=False 加载插件
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python renew.py

      - name: 📸 上传截图结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-results
          path: "*.png"
