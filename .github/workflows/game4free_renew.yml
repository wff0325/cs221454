name: Game4Free-Final-Fix

on:
  workflow_dispatch:

jobs:
  debug_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🛡️ 启动 GOST 代理 (明文)
        run: |
          curl -L -o gost.tar.gz https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost_2.11.5_linux_amd64.tar.gz
          tar -xzf gost.tar.gz && chmod +x gost
          nohup ./gost -L http://:8080 -F "socks5://506f268b:080db8e0151f@38.58.180.132:3104" > gost.log 2>&1 &
          sleep 5

      - name: 🧩 下载并安装破解插件 (Buster)
        run: |
          # 下载开源的 Buster 验证码破解插件
          wget -q https://github.com/dessant/buster/releases/download/v2.0.1/buster-2.0.1-chrome.zip -O buster.zip
          unzip buster.zip -d captcha_solver

      - name: 🛠️ 安装环境
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行随机名续期脚本
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python renew.py

      - name: 📸 上传截图结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-debug-results
          path: "*.png"
