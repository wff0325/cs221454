name: Game4Free-Random-Debug

on:
  workflow_dispatch:

jobs:
  debug_renew:
    runs-on: ubuntu-latest
    # 赋予 gh 工具必要的权限
    permissions:
      contents: read
      
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST 代理 (GH 原生下载版)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 使用内置 Token 确保下载成功
        run: |
          # 使用官方 gh 工具下载 GOST，彻底告别 9 字节错误
          gh release download v2.11.5 --repo ginuerzh/gost --pattern "*linux_amd64.tar.gz" -O gost.tar.gz
          tar -xzf gost.tar.gz
          chmod +x gost
          
          # 启动隧道
          nohup ./gost -L http://:8080 -F "socks5://506f268b:080db8e0151f@38.58.180.132:3104" > gost.log 2>&1 &
          sleep 5
          echo "✅ GOST 已就绪"

      - name: 🧩 下载破解插件 (GH 原生下载版)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用官方 gh 工具下载 Buster 插件
          gh release download v2.0.1 --repo dessant/buster --pattern "*chrome.zip" -O buster.zip
          mkdir -p captcha_solver
          unzip buster.zip -d captcha_solver
          echo "✅ 插件已就绪"

      - name: 🛠️ 安装环境
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行随机名续期脚本
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python renew.py

      - name: 📸 上传截图结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-results
          path: "*.png"
