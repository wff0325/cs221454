name: Game4Free-Final-Fix

on:
  workflow_dispatch:

jobs:
  debug_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🛡️ 启动 GOST 代理
        run: |
          curl -L -o gost.tar.gz https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost_2.11.5_linux_amd64.tar.gz
          tar -xzf gost.tar.gz && chmod +x gost
          nohup ./gost -L http://:8080 -F "socks5://506f268b:080db8e0151f@38.58.180.132:3104" > gost.log 2>&1 &
          sleep 5

      - name: 🧩 下载并安装破解插件 (修复版)
        run: |
          # 创建插件目录
          mkdir -p captcha_solver
          # 使用 curl 代替 wget，并添加 User-Agent 模拟浏览器下载，防止 403 错误
          # 这是一个经测试有效的 Buster 2.0.1 直链
          curl -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -o buster.zip https://github.com/dessant/buster/releases/download/v2.0.1/buster-2.0.1-chrome.zip
          
          # 检查下载的文件是否合法 (大于 10KB)
          if [ $(stat -c%s "buster.zip") -lt 10240 ]; then
            echo "❌ 插件下载失败，正在尝试备用源..."
            curl -L -o buster.zip https://github.com/fastfire/deep-checker/raw/master/static/buster.zip
          fi
          
          unzip -o buster.zip -d captcha_solver
          echo "✅ 插件准备就绪"

      - name: 🛠️ 安装环境
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行随机名续期脚本
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python renew.py

      - name: 📸 上传截图结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-debug-results
          path: "*.png"
