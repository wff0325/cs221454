name: Game4Free-Firefox-Final

on:
  workflow_dispatch:
  schedule:
    - cron:

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST V3 代理 (出口地址校验)
        run: |
          curl -fL -o gost.tar.gz "https://github.com/go-gost/gost/releases/download/v3.2.6/gost_3.2.6_linux_amd64v3.tar.gz"
          tar -xzf gost.tar.gz && chmod +x gost
          nohup ./gost -L http://:8080 -F "socks5://6974305c:c37294d346da@65.108.224.31:26706" > gost.log 2>&1 &
          
          sleep 10
          echo "🌐 [代理测试] 正在验证出口 IP 地址..."
          EXIT_IP=$(curl -s -x http://127.0.0.1:8080 https://api.ipify.org || echo "连接失败")
          echo "🌍 当前代理出口 IP 为: $EXIT_IP"
          
          if [ "$EXIT_IP" == "连接失败" ]; then
            echo "❌ 代理不可用，请检查 SOCKS5 账号"
            exit 1
          fi

      - name: 🧩 下载 Buster 插件 (Firefox 版 .xpi)
        run: |
          mkdir -p captcha_solver
          # 下载最新的火狐专用 .xpi 插件包
          curl -fL -o captcha_solver/buster.xpi "https://addons.mozilla.org/firefox/downloads/file/4067332/buster_captcha_solver_for_humans-3.1.0.xpi"
          echo "✅ Firefox 插件已保存至 captcha_solver/buster.xpi"

      - name: 🛠️ 安装 Firefox 环境 (绕过 Snap 方案)
        run: |
          sudo snap remove firefox || true
          sudo add-apt-repository -y ppa:mozillateam/ppa
          echo '
          Package: *
          Pin: release o=LP-PPA-mozillateam
          Pin-Priority: 1001
          ' | sudo tee /etc/apt/preferences.d/mozilla-firefox
          sudo apt-get update
          sudo apt-get install -y firefox xvfb
          pip install seleniumbase
          seleniumbase install geckodriver

      - name: 🚀 运行随机名续期脚本 (修正插件加载)
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firefox-results
          path: "*.png"
