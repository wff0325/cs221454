name: Game4Free-V3-BusterV3-Final

on:
  workflow_dispatch:

jobs:
  debug_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST V3 代理 (使用指定 v3.2.6 直链)
        run: |
          # 下载你指定的 GOST v3.2.6
          curl -fL -o gost.tar.gz "https://github.com/go-gost/gost/releases/download/v3.2.6/gost_3.2.6_linux_amd64v3.tar.gz"
          tar -xzf gost.tar.gz
          chmod +x gost
          
          # 启动隧道 (本地 8080 -> 你的 SOCKS5)
          nohup ./gost -L http://:8080 -F "socks5://506f268b:080db8e0151f@38.58.180.132:3104" > gost.log 2>&1 &
          
          sleep 8
          echo "✅ GOST V3.2.6 已启动"
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org || echo "代理连接测试失败"

      - name: 🧩 下载破解插件 (使用指定 Buster v3.1.0 直链)
        run: |
          # 下载你指定的 Buster v3.1.0
          curl -fL -o buster.zip "https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip"
          mkdir -p captcha_solver
          unzip -o buster.zip -d captcha_solver
          echo "✅ Buster V3.1.0 插件已就绪"

      - name: 🛠️ 安装系统环境
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable xvfb
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行随机名续期脚本
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3-buster3-results
          path: "*.png"
