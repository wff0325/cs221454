name: FGH-Renew-Test
on:
  workflow_dispatch: # 手动触发测试

jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛡️ 启动 GOST 代理转发
        run: |
          wget -q https://github.com/ginuerzh/gost/releases/download/v2.11.5/gost_2.11.5_linux_amd64.tar.gz
          tar -xzf gost_2.11.5_linux_amd64.tar.gz
          chmod +x gost
          # 直接填入你的代理地址
          nohup ./gost -L http://:8080 -F "socks5://506f268b:080db8e0151f@38.58.180.132:3104" > gost.log 2>&1 &
          sleep 5
          echo "✅ GOST 已启动，当前出口IP："
          curl -s -x http://127.0.0.1:8080 https://api.ipify.org || echo "代理连接失败"

      - name: 🛠️ 安装环境依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: 🚀 运行续费脚本
        env:
          PYTHONIOENCODING: utf-8
        run: |
          # 模拟显示器运行脚本
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
